name: Generate AI Video

on:
  # Runs automatically whenever a script file is added/edited
  push:
    paths:
      - "scripts/**.txt"
  # Lets you trigger it manually from the Actions tab, choosing which script to render
  workflow_dispatch:
    inputs:
      script_path:
        description: "Path to an EXISTING .txt file already committed in this repo, e.g. scripts/example_script.txt (NOT the script text itself)"
        required: false
        default: "scripts/example_script.txt"
      voice:
        description: "Optional: override TTS voice (e.g. fa-IR-DilaraNeural, ja-JP-NanamiNeural)"
        required: false
        default: ""

jobs:
  build-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine script path
        id: pick
        env:
          INPUT_SCRIPT_PATH: ${{ github.event.inputs.script_path }}
        run: |
          if [ -n "$INPUT_SCRIPT_PATH" ]; then
            RAW="$INPUT_SCRIPT_PATH"
          else
            RAW=$(git diff --name-only HEAD^ HEAD -- 'scripts/*.txt' 2>/dev/null | head -n 1)
            RAW="${RAW:-scripts/example_script.txt}"
          fi

          LEN=${#RAW}
          if [ "$LEN" -gt 200 ] || [ "$(printf '%s' "$RAW" | wc -l)" -gt 0 ] || [[ "$RAW" != *.txt ]]; then
            echo "::error::The 'script_path' input must be a short path to a .txt file already committed in this repo (example: scripts/example_script.txt) - not the script text itself. Add your script as a file under scripts/ first, then enter its path here."
            exit 1
          fi

          if [ ! -f "$RAW" ]; then
            echo "::error::No file found at '$RAW' in this repo. Commit your script under scripts/ first (e.g. scripts/my_script.txt), then re-run with that path."
            exit 1
          fi

          echo "path=$RAW" >> "$GITHUB_OUTPUT"

      - name: Generate video
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.voice }}" ]; then
            EXTRA_ARGS="--voice ${{ github.event.inputs.voice }}"
          fi
          python generate_video.py --script "${{ steps.pick.outputs.path }}" --out output/final_video.mp4 $EXTRA_ARGS

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output/final_video.mp4
          retention-days: 14
